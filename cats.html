<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MeowFit — Cat Bodies</title>
<link rel="stylesheet" href="assets/layout.css">
<link rel="stylesheet" href="assets/body.css">
<link rel="stylesheet" href="assets/ear.css">
<link rel="stylesheet" href="assets/eye.css">
<link rel="stylesheet" href="assets/cheek.css">
<link rel="stylesheet" href="assets/whiskers.css">
<link rel="stylesheet" href="assets/mouth.css">
</head>
<body>
  <div class="stage">
    <div class="cat body-xobese">
      <span class="ear ear-xobese left"><span class="ear-inner ear-inner-xobese"></span></span>
      <span class="ear ear-xobese right"><span class="ear-inner ear-inner-xobese"></span></span>
      <span class="eye eye-xobese left"><i></i></span>
      <span class="eye eye-xobese right"><i></i></span>
      <span class="cheek cheek-xobese left"></span>
      <span class="cheek cheek-xobese right"></span>
      <span class="whiskers whiskers-xobese left"></span>
      <span class="whiskers whiskers-xobese right"></span>
      <span class="mouth mouth-xobese"></span>
    </div>
    <div class="label">Extremely Obese</div>
  </div>

  <div class="stage">
    <div class="cat body-obese">
      <span class="ear ear-obese left"><span class="ear-inner ear-inner-obese"></span></span>
      <span class="ear ear-obese right"><span class="ear-inner ear-inner-obese"></span></span>
      <span class="eye eye-obese left"><i></i></span>
      <span class="eye eye-obese right"><i></i></span>
      <span class="cheek cheek-obese left"></span>
      <span class="cheek cheek-obese right"></span>
      <span class="whiskers whiskers-obese left"></span>
      <span class="whiskers whiskers-obese right"></span>
      <span class="mouth mouth-obese"></span>
    </div>
    <div class="label">Obese</div>
  </div>

  <div class="stage">
    <div class="cat body-overweight">
      <span class="ear ear-overweight left"><span class="ear-inner ear-inner-overweight"></span></span>
      <span class="ear ear-overweight right"><span class="ear-inner ear-inner-overweight"></span></span>
      <span class="eye eye-overweight left"><i></i></span>
      <span class="eye eye-overweight right"><i></i></span>
      <span class="cheek cheek-overweight left"></span>
      <span class="cheek cheek-overweight right"></span>
      <span class="whiskers whiskers-overweight left"></span>
      <span class="whiskers whiskers-overweight right"></span>
      <span class="mouth mouth-overweight"></span>
    </div>
    <div class="label">Overweight</div>
  </div>

  <div class="stage">
    <div class="cat body-normal">
      <span class="ear ear-normal left"><span class="ear-inner ear-inner-normal"></span></span>
      <span class="ear ear-normal right"><span class="ear-inner ear-inner-normal"></span></span>
      <span class="eye eye-normal left"><i></i></span>
      <span class="eye eye-normal right"><i></i></span>
      <span class="cheek cheek-normal left"></span>
      <span class="cheek cheek-normal right"></span>
      <span class="whiskers whiskers-normal left"></span>
      <span class="whiskers whiskers-normal right"></span>
      <span class="mouth mouth-normal"></span>
    </div>
    <div class="label">Normal</div>
  </div>

  <div class="stage">
    <div class="cat body-underweight">
      <span class="ear ear-underweight left"><span class="ear-inner ear-inner-underweight"></span></span>
      <span class="ear ear-underweight right"><span class="ear-inner ear-inner-underweight"></span></span>
      <span class="eye eye-underweight left"><i></i></span>
      <span class="eye eye-underweight right"><i></i></span>
      <span class="cheek cheek-underweight left"></span>
      <span class="cheek cheek-underweight right"></span>
      <span class="whiskers whiskers-underweight left"></span>
      <span class="whiskers whiskers-underweight right"></span>
      <span class="mouth mouth-underweight"></span>
    </div>
    <div class="label">Underweight</div>
  </div>
</body>
</html>
